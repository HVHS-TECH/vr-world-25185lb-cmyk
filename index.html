<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
 <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>   
  </head>
    <body>
    <a-scene>
      <a-sky color=""></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:grassland with animal.ply"
      position="5 -6 5"
      rotation="-90 0 90"
      ></a-entity>

      <a-entity 
      ply-model="src:pig.ply"
      position="3 -1 0.8"
      rotation="-90 90 180"
      animation="property:position; to:3 0 0.8; loop:true; dir:alternate; dur:100;"
      ></a-entity>
    
   <a-entity 
      ply-model="src:pig.ply"
      position="2 -1 -3.5"
      rotation="-90 -2 0"
      animation="property:position; to:2 0 -3.5; loop:true; dir:alternate; dur:200;"
    ></a-entity>

    <a-entity 
      ply-model="src:pig.ply"
      position="-1.2 -1 3"
      rotation="-90 180 0"
      animation="property:position; to:1 -1 1; loop:true; dir:alternate; dur:200;"
    ></a-entity>
    </a-scene>
  </body>
</html>
